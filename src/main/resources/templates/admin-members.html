
<div class="card-shadow">

    <!-- Header + Add Member Button -->
    <div class="card-header flex-between">
        <div>
            <h4>Member List</h4>
            <p class="text-muted">
                Manage all member information with full CRUD operations
            </p>
        </div>

        <a th:href="@{/admin/members/add}" class="btn-primary">
            <i data-lucide="user-plus"></i>
            Add Member
        </a>

    </div>

    <!-- Search + Filter Bar -->
    <div class="filter-bar">

        <div class="search-box">

            <form class="search-box" method="get" th:action="@{/admin/members}">
                <i data-lucide="search"></i>
            <input type="text"
                   name="keyword"
                   placeholder="Search by name, phone, or email..."
                   th:value="${keyword}">
            </form>
        </div>

        <div class="filter-group">

            <!-- LEVEL -->
            <div class="dropdown">
                <button class="btn-filter">
                    <i data-lucide="filter"></i>
                    <span th:text="${selectedLevel != null ? selectedLevel : 'All Levels'}">
            All Levels
        </span>
                    <i data-lucide="chevron-down"></i>
                </button>

                <div class="dropdown-menu">

                    <!-- All Levels -->
                    <a class="dropdown-item"
                       th:href="@{/admin/members(
               keyword=${keyword},
               status=${selectedStatus}
           )}">
                        All Levels
                    </a>

                    <!-- Each level -->
                    <a class="dropdown-item"
                       th:each="lvl : ${levels}"
                       th:href="@{/admin/members(
               keyword=${keyword},
               level=${lvl},
               status=${selectedStatus}
           )}"
                       th:text="${lvl}">
                        Level
                    </a>

                </div>
            </div>


            <!-- STATUS -->
            <div class="dropdown">
                <button class="btn-filter">
                    <i data-lucide="filter"></i>
                    <span th:text="${selectedStatus != null ? selectedStatus : 'All Status'}">
            All Status
        </span>
                    <i data-lucide="chevron-down"></i>
                </button>

                <div class="dropdown-menu">

                    <!-- All Status -->
                    <a class="dropdown-item"
                       th:href="@{/admin/members(
               keyword=${keyword},
               level=${selectedLevel}
           )}">
                        All Status
                    </a>

                    <!-- Each status -->
                    <a class="dropdown-item"
                       th:each="st : ${statuses}"
                       th:href="@{/admin/members(
               keyword=${keyword},
               level=${selectedLevel},
               status=${st}
           )}"
                       th:text="${st}">
                        Status
                    </a>

                </div>
            </div>


        </div>


    </div>

    <!-- Member Table -->
    <div class="table-responsive">
        <table class="table member-table">

            <thead>
            <tr>
                <th>Name</th>
                <th>Contact</th>
                <th>Level</th>
                <th>Points</th>
                <th>Join Date</th>
                <th>Status</th>
                <th class="text-right">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="member : ${members}"
                th:classappend="${member.status.name() == 'INACTIVE'} ? 'row-inactive'">

            <!-- Name -->
                <td th:text="${member.name}">Name</td>

                <!-- Contact -->
                <td>
                    <div th:text="${member.phone}">Phone</div>
                    <div class="text-muted small"
                         th:text="${member.email}">
                        Email
                    </div>
                </td>

                <!-- Level Badge -->
                <td>
                    <span class="badge"
                          th:classappend="
                            ${member.level.name() == 'SENIOR'} ? 'badge-purple' :
                            (${member.level.name() == 'INTERMEDIATE'} ? 'badge-blue' :
                            'badge-gray')"
                          th:text="${member.level}">
                        Level
                    </span>
                </td>

                <!-- Points -->
                <td th:text="${#numbers.formatInteger(member.points, 0, 'COMMA')}">
                    0
                </td>

                <!-- Join Date -->
                <td th:text="${#temporals.format(member.joinDate, 'M/d/yyyy')}">
                    1/1/2024
                </td>

                <!-- Status Badge -->
                <td>
                    <span class="badge-outline"
                          th:classappend="
                            ${member.status.name() == 'ACTIVE'} ?
                            'badge-success' : 'badge-secondary'"
                          th:text="${member.status}">
                        Status
                    </span>
                </td>

                <td class="text-right actions-cell">
                    <div class="action-group">
                        <a th:href="@{/admin/members/edit/{id}(id=${member.id})}"
                           class="icon-btn"
                           title="Edit">
                            <i data-lucide="edit-3"></i>
                        </a>

                        <form th:action="@{/admin/members/delete/{id}(id=${member.id})}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('Deactivate this member?');">

                            <button type="submit"
                                    class="icon-btn danger"
                                    title="Deactivate">
                                <i data-lucide="trash-2"></i>
                            </button>

                        </form>

                    </div>
                </td>



            </tr>
            </tbody>

        </table>
    </div>

</div>
